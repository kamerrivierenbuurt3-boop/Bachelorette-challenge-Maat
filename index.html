<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bachelorette Challenge 💍</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffe6ef;
    margin:0;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#d63384;
}

p{
    text-align:center;
}

label{
    display:block;
    padding:12px;
    margin:10px 0;
    background:#fff7fa;
    border-radius:10px;
    cursor:pointer;
}

input[type=checkbox]{
    transform:scale(1.3);
    margin-right:10px;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

.progress{
    text-align:center;
    font-weight:bold;
    color:#d63384;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>💍 Bachelorette Challenge 💍</h1>

<p>Vink alle opdrachten af!</p>

<div class="progress">
Voltooid: <span id="score">0</span>/<span id="total"></span>
</div>

<div id="list"></div>

</div>

<script>

const opdrachten = [
"🚆 Vraag de conducteur of je de volgende halte mag omroepen",
"💃 Doe de Dirty van Christina Aguilera dans",
"😏 Geef een lapdance aan een man",
"🌊 Ga skinny dippen",
"🍹 Regel gratis drank voor de groep",
"📱 Doe een TikTok-trend met een onbekende (60+)",
"🌀 Verkoop 3 Aventi Mini Ventilatoren aan onbekenden voor €15",
"🎤 Zing: 'It's only like you're here with me, although...'"
];

const lijst = document.getElementById("list");
const total = document.getElementById("total");
total.innerText = opdrachten.length;

opdrachten.forEach((tekst,i)=>{

let checked = localStorage.getItem("taak"+i)=="true";

let label = document.createElement("label");

label.innerHTML = `
<input type="checkbox" ${checked?"checked":""}>
<span>${tekst}</span>
`;

let box = label.querySelector("input");
let span = label.querySelector("span");

if(checked) span.classList.add("completed");

box.onchange = function(){
    localStorage.setItem("taak"+i, box.checked);
    span.classList.toggle("completed", box.checked);
    updateScore();
}

lijst.appendChild(label);

});

function updateScore(){
let klaar = 0;

document.querySelectorAll("input").forEach(x=>{
if(x.checked) klaar++;
});

document.getElementById("score").innerText = klaar;
}

updateScore();

</script>

</body>
</html>
